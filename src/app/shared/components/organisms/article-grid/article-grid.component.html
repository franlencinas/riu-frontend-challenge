<section class="bg-white py-8 md:py-12 lg:py-24" aria-label="Article grid">
  <div class="max-w-[1542px] mx-auto px-5 md:px-8">
    <app-section-header
      [title]="sectionTitle"
      [label]="sectionLabel">
    </app-section-header>
    <div class="grid grid-cols-1 gap-8 md:grid-cols-2 lg:grid-cols-3">
      <app-article-card
        *ngFor="let article of articles"
        [title]="article.title"
        [body]="article.body"
        [date]="article.date"
      ></app-article-card>
    </div>
  </div>
</section>
